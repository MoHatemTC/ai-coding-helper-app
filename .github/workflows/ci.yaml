# Name of the workflow
name: CI

# Define when the workflow runs
on:
  pull_request:
  push:
    branches: [master, dev]
  workflow_dispatch:

# Read-only repository permission
permissions:
  contents: read

# Environment variables shared by jobs
env:
  PYTHONPATH: ${{ github.workspace }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  RUN_LLM_TESTS: ${{ secrets.OPENAI_API_KEY != '' && '1' || '0' }}

jobs:
  checks:
    name: Code quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Check Python syntax
        run: uv run python -m compileall -q .

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Check Ruff formatting
        run: uv run ruff format --check .

      - name: Run Pyright
        run: uv run pyright
        continue-on-error: true

      - name: Run health tests
        run: uv run pytest tests/test_health.py -q --maxfail=1

  health-server:
    name: FastAPI health server
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python and uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Start FastAPI server
        run: |
          uv run uvicorn health_api:app \
            --host 127.0.0.1 \
            --port 8000 \
            > server.log 2>&1 &

          echo $! > server.pid

      - name: Wait for server
        run: |
          for i in {1..30}; do
            if curl --fail http://127.0.0.1:8000/health; then
              exit 0
            fi

            sleep 1
          done

          echo "FastAPI server did not start successfully."
          cat server.log
          exit 1

      - name: Confirm HTTP 200 status
        run: |
          status_code=$(curl -s -o response.json -w "%{http_code}" \
            http://127.0.0.1:8000/health)

          cat response.json

          test "$status_code" = "200"
